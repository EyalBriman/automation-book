project:
  type: book
  output-dir: docs

book:
  title: "מאגר שאלות — אוטומציה"
  author: ""
  chapters:
    - index.qmd
    - chapters/plc.qmd
    - chapters/models_control.qmd
    - chapters/sensors_actuators.qmd
    - chapters/arduino.qmd
    - chapters/cv.qmd
  sidebar:
    logo: assets/logo.png
    logo-alt: "מאגר שאלות אוטומציה"

format:
  html:
    theme: default
    toc: true
    toc-title: "בפרק זה"
    number-sections: false
    df-print: paged
    css:
      - assets/rtl-baseline.css
      - assets/styles.css
    include-in-header: assets/fonts.html
    include-after-body:
      - assets/auto-env-titles.html

lang: he

filters:
  - assets/env-to-callout.lua
