<script>
document.addEventListener('DOMContentLoaded', () => {
  function chapterNumber() {
    const h1 = document.querySelector('main h1[data-number]');
    if (h1) return h1.getAttribute('data-number').split('.')[0];
    const sec = document.querySelector('.header-section-number');
    if (sec) return sec.textContent.trim().split('.')[0];
    return '1';
  }
  const chap = chapterNumber();

  const envs = {
    exercise:    { label: 'שאלה',   color: 'rgba(29,110,219,0.32)',  numbered: true  },
    definition:  { label: 'הגדרה',  color: 'rgba(220,80,10,0.30)',   numbered: true  },
    example:     { label: 'דוגמה',  color: 'rgba(128,40,220,0.28)',  numbered: true  },
    remark:      { label: 'הערה',   color: 'rgba(0,0,0,0.11)',       numbered: true  },
    theorem:     { label: 'משפט',   color: 'rgba(200,140,0,0.38)',   numbered: true  },
    lemma:       { label: 'למה',    color: 'rgba(200,140,0,0.38)',   numbered: true  },
    proposition: { label: 'טענה',   color: 'rgba(200,140,0,0.38)',   numbered: true  },
    corollary:   { label: 'מסקנה',  color: 'rgba(200,140,0,0.38)',   numbered: true  },
    proof:       { label: 'הוכחה',  color: 'rgba(30,160,90,0.32)',   numbered: false }
  };

  const counters = Object.fromEntries(Object.keys(envs).map(k => [k, 0]));

  Object.keys(envs).forEach(env => {
    document.querySelectorAll('div.' + env).forEach(div => {
      const meta = envs[env];
      if (!div.querySelector(':scope > .theorem-title')) {
        const title = document.createElement('div');
        title.className = 'theorem-title';
        counters[env] += meta.numbered ? 1 : 0;
        title.textContent = meta.numbered
          ? meta.label + ' ' + chap + '.' + counters[env]
          : meta.label;
        div.insertBefore(title, div.firstChild);
      }
      div.classList.add('envbox');
      div.style.setProperty('--env-color', meta.color);
      const firstP = div.querySelector(':scope > p');
      if (firstP) firstP.innerHTML = firstP.innerHTML.replace(/^\s*(Remark|Proof)\.?\s*/i, '');
    });
  });
});
</script>
